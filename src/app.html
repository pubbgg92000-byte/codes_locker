<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      const theme = localStorage.getItem('codes-locker-theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      if (theme === 'dark' || (!theme && prefersDark)) document.documentElement.classList.add('dark');
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="bg-cloud text-ink antialiased dark:bg-[#0d1118] dark:text-white">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
